# gene-set-fetch — set catalog
#
# Single source of truth. Every set name in the SKILL.md catalog has a recipe here.
# Three recipe types:
#
#   - source:    one fetcher under fetchers/, produces the canonical list
#   - compose:   set algebra (union / intersection) over other named sets
#
# All set algebra joins on `ensembl_id`, normalized to the Ensembl release
# passed at runtime (--ensembl-release, default below).

defaults:
  ensembl_release: 113

sets:

  # ---- Protein-coding ----

  protein_coding_human:
    species: human
    source: ensembl_biomart
    args:
      biotype: protein_coding

  protein_coding_human_strict:
    species: human
    compose:
      op: intersection
      members:
        - protein_coding_human          # Ensembl biotype
        - protein_coding_human_hgnc     # HGNC locus_type == "gene with protein product"
        - protein_coding_human_gencode  # GENCODE gene_type == "protein_coding"

  protein_coding_human_hgnc:
    species: human
    source: hgnc
    args:
      locus_type: gene_with_protein_product

  protein_coding_human_gencode:
    species: human
    source: gencode
    args:
      gene_type: protein_coding

  protein_coding_mouse:
    species: mouse
    source: ensembl_biomart
    args:
      biotype: protein_coding

  protein_coding_mouse_strict:
    species: mouse
    compose:
      op: intersection
      members:
        - protein_coding_mouse          # Ensembl biotype
        - protein_coding_mouse_mgi      # MGI feature_type "protein coding gene"
        - protein_coding_mouse_gencode  # GENCODE gene_type == "protein_coding"

  protein_coding_mouse_mgi:
    species: mouse
    source: mgi
    args:
      feature_type: protein_coding_gene

  protein_coding_mouse_gencode:
    species: mouse
    source: gencode
    args:
      gene_type: protein_coding

  # ---- Transcription factors ----

  tfs_human_lambert2018:
    species: human
    source: lambert2018

  tfs_human_animaltfdb:
    species: human
    source: animaltfdb
    args:
      species_code: Homo_sapiens

  tfs_human_union:
    species: human
    compose:
      op: union
      members:
        - tfs_human_lambert2018
        - tfs_human_animaltfdb

  tfs_human_intersection:
    species: human
    compose:
      op: intersection
      members:
        - tfs_human_lambert2018
        - tfs_human_animaltfdb

  tfs_mouse_animaltfdb:
    species: mouse
    source: animaltfdb
    args:
      species_code: Mus_musculus

  tfs_mouse_lambert_orthologs:
    species: mouse
    source: ensembl_compara_ortholog_map
    # Ensembl Compara via REST is used here instead of DIOPT. Rationale in
    # SKILL.md and fetchers/ensembl_compara_ortholog_map.py: Compara wins on
    # the canonical/durable axis (immutable per-release archived endpoint;
    # official authority for vertebrate homology). If you want a DIOPT-based
    # variant, add a sibling fetcher and a sibling named set.
    args:
      from_set: tfs_human_lambert2018
      from_species: human
      to_species: mouse
      best_match: false

  tfs_mouse_union:
    species: mouse
    compose:
      op: union
      members:
        - tfs_mouse_animaltfdb
        - tfs_mouse_lambert_orthologs

  tfs_mouse_intersection:
    species: mouse
    compose:
      op: intersection
      members:
        - tfs_mouse_animaltfdb
        - tfs_mouse_lambert_orthologs

  tfs_rat_animaltfdb:
    species: rat
    source: animaltfdb
    args:
      species_code: Rattus_norvegicus

  tfs_rat_lambert_orthologs:
    species: rat
    source: ensembl_compara_ortholog_map
    args:
      from_set: tfs_human_lambert2018
      from_species: human
      to_species: rat
      best_match: false

  tfs_rat_union:
    species: rat
    compose:
      op: union
      members:
        - tfs_rat_animaltfdb
        - tfs_rat_lambert_orthologs

  tfs_rat_intersection:
    species: rat
    compose:
      op: intersection
      members:
        - tfs_rat_animaltfdb
        - tfs_rat_lambert_orthologs

  # ---- JASPAR motif-backed TFs ----
  #
  # `tfs_{species}_jaspar` = genes with >=1 JASPAR CORE binding profile for
  # that taxon (a "TF with a known motif"). JASPAR is a distinct authority,
  # so it ships as a first-class set. "TFs which have a JASPAR motif" is then
  # the INTERSECTION of a curated TF set with the JASPAR set — no filter flag,
  # just compose.py doing set algebra on ensembl_id.
  #
  # Human CORE is well covered (~900 latest profiles). Mouse/rat CORE are
  # sparse (most vertebrate profiles are tagged to the species they were
  # derived in) — see SKILL.md "JASPAR motif coverage".

  tfs_human_jaspar:
    species: human
    source: jaspar
    args:
      tax_id: 9606

  tfs_mouse_jaspar:
    species: mouse
    source: jaspar
    args:
      tax_id: 10090

  tfs_rat_jaspar:
    species: rat
    source: jaspar
    args:
      tax_id: 10116

  # Curated-TF ∩ JASPAR: "the TF list, restricted to those with a JASPAR
  # motif". Each is composed over network-fetchable members only (Lambert for
  # human; Lambert orthologs via Compara for mouse/rat), so they resolve
  # out of the box without the manual AnimalTFDB placement step. For
  # AnimalTFDB- or union-based variants, add a recipe (see SKILL.md).

  tfs_human_lambert2018_jaspar:
    species: human
    compose:
      op: intersection
      members:
        - tfs_human_lambert2018
        - tfs_human_jaspar

  tfs_mouse_lambert_orthologs_jaspar:
    species: mouse
    compose:
      op: intersection
      members:
        - tfs_mouse_lambert_orthologs
        - tfs_mouse_jaspar

  tfs_rat_lambert_orthologs_jaspar:
    species: rat
    compose:
      op: intersection
      members:
        - tfs_rat_lambert_orthologs
        - tfs_rat_jaspar
